<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15140f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tapes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #15140f;
  --surface: #1f1d17;
  --surface-2: #25221b;
  --text: #e8e3d5;
  --muted: #807a6b;
  --dim: #3a3528;
  --accent: #d4a574;
  --border: #2a2820;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
}

html, body { background: var(--bg); }

body {
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.player {
  width: 100%;
  max-width: 560px;
  background: var(--surface);
  border: 1px solid var(--border);
}

/* —— readout —— */
.readout {
  padding: 28px 28px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.025);
}

.readout-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
}

.state-row { display: flex; align-items: center; gap: 6px; }

.state-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--dim);
}
.state-dot.on { background: var(--accent); }

.now-title {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1.2;
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.now-title.empty { color: var(--muted); font-weight: 400; font-size: 14px; }

.now-artist {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 22px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-height: 1em;
}

.readout-time {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}

.progress {
  height: 3px;
  background: var(--dim);
  cursor: pointer;
  position: relative;
  touch-action: none;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
}

/* —— controls —— */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  padding: 18px;
  border-bottom: 1px solid var(--border);
}

.ctrl {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  min-width: 48px;
  height: 44px;
  padding: 0 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 120ms;
}

.ctrl:hover { border-color: var(--muted); }
.ctrl:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; }

.ctrl-play {
  min-width: 64px;
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-size: 15px;
}
.ctrl-play:hover { background: #e0b384; border-color: #e0b384; }

.ctrl-shuffle, .ctrl-repeat {
  font-size: 10px;
  letter-spacing: 0.15em;
}

.ctrl.active {
  color: var(--accent);
  border-color: var(--accent);
}

/* —— volume —— */
.volume {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--muted);
}

.vol-slider {
  flex: 1;
  appearance: none;
  -webkit-appearance: none;
  height: 2px;
  background: var(--dim);
  cursor: pointer;
  outline: none;
}
.vol-slider::-webkit-slider-thumb {
  appearance: none;
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
}
.vol-slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
}

/* —— playlist —— */
.playlist {
  list-style: none;
  max-height: 360px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.playlist::-webkit-scrollbar { width: 6px; }
.playlist::-webkit-scrollbar-track { background: transparent; }
.playlist::-webkit-scrollbar-thumb { background: var(--dim); }

.track {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 13px;
  min-height: 48px;
}
.track:last-child { border-bottom: none; }
.track:hover { background: var(--surface-2); }

.track-idx {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  min-width: 24px;
  flex-shrink: 0;
}

.track-info {
  display: flex;
  flex-direction: column;
  min-width: 0;
  flex: 1;
}

.track-title {
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.track-artist {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.track.active .track-idx,
.track.active .track-title {
  color: var(--accent);
}

.empty-state {
  padding: 24px;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--mono);
  text-align: center;
  line-height: 1.6;
}

@media (max-width: 480px) {
  body { padding: 0; align-items: stretch; }
  .player { border: none; min-height: 100vh; max-width: none; }
  .readout { padding: 24px 20px 18px; }
  .track { padding: 14px 20px; }
  .volume { padding: 14px 20px; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>
<main class="player" aria-label="Music player">
  <header class="readout">
    <div class="readout-meta">
      <span class="track-num">— / —</span>
      <span class="state-row">
        <span class="state-dot" aria-hidden="true"></span>
        <span class="state">stopped</span>
      </span>
    </div>
    <div class="now-title empty">No track loaded</div>
    <div class="now-artist"></div>
    <div class="readout-time">
      <span class="time-current">0:00</span>
      <span class="time-total">0:00</span>
    </div>
    <div class="progress" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
      <div class="progress-fill"></div>
    </div>
  </header>

  <div class="controls">
    <button class="ctrl ctrl-shuffle" aria-label="Shuffle" aria-pressed="false">SHUF</button>
    <button class="ctrl ctrl-prev" aria-label="Previous">‹‹</button>
    <button class="ctrl ctrl-play" aria-label="Play">▶</button>
    <button class="ctrl ctrl-next" aria-label="Next">››</button>
    <button class="ctrl ctrl-repeat" aria-label="Repeat" aria-pressed="false">RPT</button>
  </div>

  <div class="volume">
    <span>VOL</span>
    <input type="range" min="0" max="100" value="80" class="vol-slider" aria-label="Volume">
  </div>

  <ol class="playlist" aria-label="Track list"></ol>
</main>

<audio preload="none" playsinline x-webkit-playsinline></audio>

<script>
// ─────────────────────────────────────────────────────────────────
//  EDIT YOUR TRACKS HERE
//  
//  Drop your .mp3 files into an `audio/` folder next to this HTML,
//  then list them below. Two ways to add a track:
//
//    1) Just the file path (uses filename as title):
//         'audio/song.mp3',
//
//    2) Full form with title and artist:
//         { file: 'audio/song.mp3', title: 'Song Name', artist: 'Artist' },
//
//  You can mix both styles.
// ─────────────────────────────────────────────────────────────────

const TRACKS = [
  'audio/01\ Introduction.mp3',
  'audio/02\ Dire\ Wolf.mp3',
  'audio/03\ On\ The\ Road\ Again.mp3',
  'audio/04\ I\'ve\ Been\ All\ Around\ This\ World.mp3',
  'audio/05\ Monkey\ And\ The\ Engineer.mp3',
  'audio/06\ Jack-A-Roe.mp3',
  'audio/07\ Cassidy.mp3',
  'audio/08\ Bird\ Song.mp3',
  'audio/09\ Ain\'t\ No\ Lie.mp3',
  'audio/10\ Ripple.mp3',
  // 'audio/example-1.mp3',
  // { file: 'audio/example-2.mp3', title: 'Better Title', artist: 'The Artist' },
];

// ─────────────────────────────────────────────────────────────────

const tracks = TRACKS.map(t => {
  if (typeof t === 'string') {
    const name = t.split('/').pop().replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    return { file: t, title: name, artist: '' };
  }
  return { file: t.file, title: t.title || t.file, artist: t.artist || '' };
});

const $ = sel => document.querySelector(sel);
const audio = $('audio');
const playlistEl = $('.playlist');
const playBtn = $('.ctrl-play');
const prevBtn = $('.ctrl-prev');
const nextBtn = $('.ctrl-next');
const shuffleBtn = $('.ctrl-shuffle');
const repeatBtn = $('.ctrl-repeat');
const progressEl = $('.progress');
const progressFillEl = $('.progress-fill');
const titleEl = $('.now-title');
const artistEl = $('.now-artist');
const trackNumEl = $('.track-num');
const stateEl = $('.state');
const stateDotEl = $('.state-dot');
const timeCurrentEl = $('.time-current');
const timeTotalEl = $('.time-total');
const volSlider = $('.vol-slider');

let current = -1;
let shuffle = false;
let repeat = 'off';
let shuffleOrder = [];
let shufflePos = 0;

function fmtTime(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  s = Math.floor(s);
  const m = Math.floor(s / 60);
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function pad2(n) { return n.toString().padStart(2, '0'); }

function renderPlaylist() {
  if (tracks.length === 0) {
    playlistEl.innerHTML = '<li class="empty-state">No tracks yet.<br>Edit the TRACKS list in this file.</li>';
    return;
  }
  const frag = document.createDocumentFragment();
  tracks.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'track';
    li.dataset.index = i;
    li.innerHTML = `
      <span class="track-idx">${pad2(i + 1)}</span>
      <span class="track-info">
        <span class="track-title"></span>
        ${t.artist ? '<span class="track-artist"></span>' : ''}
      </span>`;
    // Use textContent to avoid HTML injection from track metadata
    li.querySelector('.track-title').textContent = t.title;
    if (t.artist) li.querySelector('.track-artist').textContent = t.artist;
    li.addEventListener('click', () => playIndex(i));
    frag.appendChild(li);
  });
  playlistEl.appendChild(frag);
}

function updateActiveTrack() {
  const items = playlistEl.querySelectorAll('.track');
  items.forEach((el, i) => el.classList.toggle('active', i === current));
}

function playIndex(i) {
  if (i < 0 || i >= tracks.length) return;
  current = i;
  if (shuffle) {
    const pos = shuffleOrder.indexOf(i);
    if (pos !== -1) shufflePos = pos;
  }
  const t = tracks[i];
  audio.src = t.file;
  titleEl.textContent = t.title;
  titleEl.classList.remove('empty');
  artistEl.textContent = t.artist;
  trackNumEl.textContent = `${pad2(i + 1)} / ${pad2(tracks.length)}`;
  updateActiveTrack();
  audio.play().catch(() => { /* autoplay blocked; user needs to tap */ });

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title,
      artist: t.artist || '',
    });
  }
}

function next() {
  if (tracks.length === 0) return;
  if (shuffle) {
    shufflePos = (shufflePos + 1) % shuffleOrder.length;
    playIndex(shuffleOrder[shufflePos]);
    return;
  }
  let i = current + 1;
  if (i >= tracks.length) {
    if (repeat === 'all') i = 0;
    else { audio.pause(); return; }
  }
  playIndex(i);
}

function prev() {
  if (tracks.length === 0) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (shuffle) {
    shufflePos = (shufflePos - 1 + shuffleOrder.length) % shuffleOrder.length;
    playIndex(shuffleOrder[shufflePos]);
    return;
  }
  let i = current - 1;
  if (i < 0) i = repeat === 'all' ? tracks.length - 1 : 0;
  playIndex(i);
}

function buildShuffleOrder() {
  shuffleOrder = tracks.map((_, i) => i);
  for (let i = shuffleOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
  }
  shufflePos = current >= 0 ? shuffleOrder.indexOf(current) : 0;
  if (shufflePos < 0) shufflePos = 0;
}

playBtn.addEventListener('click', () => {
  if (tracks.length === 0) return;
  if (current === -1) playIndex(shuffle ? shuffleOrder[0] : 0);
  else if (audio.paused) audio.play();
  else audio.pause();
});

prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);

shuffleBtn.addEventListener('click', () => {
  shuffle = !shuffle;
  shuffleBtn.setAttribute('aria-pressed', shuffle);
  shuffleBtn.classList.toggle('active', shuffle);
  if (shuffle) buildShuffleOrder();
});

repeatBtn.addEventListener('click', () => {
  repeat = repeat === 'off' ? 'all' : repeat === 'all' ? 'one' : 'off';
  repeatBtn.classList.toggle('active', repeat !== 'off');
  repeatBtn.setAttribute('aria-pressed', repeat !== 'off');
  repeatBtn.textContent = repeat === 'one' ? 'RPT1' : 'RPT';
});

audio.addEventListener('play', () => {
  playBtn.textContent = '⏸';
  playBtn.setAttribute('aria-label', 'Pause');
  stateEl.textContent = 'playing';
  stateDotEl.classList.add('on');
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
});

audio.addEventListener('pause', () => {
  playBtn.textContent = '▶';
  playBtn.setAttribute('aria-label', 'Play');
  stateEl.textContent = 'paused';
  stateDotEl.classList.remove('on');
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
});

audio.addEventListener('ended', () => {
  if (repeat === 'one') { audio.currentTime = 0; audio.play(); }
  else next();
});

// Tell the OS where we are in the track (lock screen scrubber).
function updatePositionState() {
  if (!('mediaSession' in navigator) || !('setPositionState' in navigator.mediaSession)) return;
  if (!isFinite(audio.duration) || audio.duration <= 0) return;
  try {
    navigator.mediaSession.setPositionState({
      duration: audio.duration,
      playbackRate: audio.playbackRate,
      position: audio.currentTime,
    });
  } catch (_) { /* some browsers throw on bad values */ }
}
audio.addEventListener('loadedmetadata', updatePositionState);
audio.addEventListener('play', updatePositionState);
audio.addEventListener('pause', updatePositionState);
audio.addEventListener('seeked', updatePositionState);

audio.addEventListener('timeupdate', () => {
  if (document.hidden) return; // skip DOM updates when tab is in background
  const dur = audio.duration;
  if (!isFinite(dur) || dur <= 0) return;
  const pct = (audio.currentTime / dur) * 100;
  progressFillEl.style.width = pct + '%';
  progressEl.setAttribute('aria-valuenow', Math.round(pct));
  timeCurrentEl.textContent = fmtTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  timeTotalEl.textContent = fmtTime(audio.duration);
});

audio.addEventListener('error', () => {
  stateEl.textContent = 'error';
  stateDotEl.classList.remove('on');
});

function seek(e) {
  if (!isFinite(audio.duration)) return;
  const rect = progressEl.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  audio.currentTime = audio.duration * pct;
}
progressEl.addEventListener('click', seek);
progressEl.addEventListener('keydown', e => {
  if (!isFinite(audio.duration)) return;
  if (e.key === 'ArrowRight') audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
  else if (e.key === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 5);
});

volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
});
audio.volume = 0.8;

// Sync UI when returning to a hidden tab
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isFinite(audio.duration) && audio.duration > 0) {
    progressFillEl.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
    timeCurrentEl.textContent = fmtTime(audio.currentTime);
  }
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' && e.target.tagName !== 'BUTTON') {
    e.preventDefault();
    playBtn.click();
  } else if (e.key === 'ArrowRight' && e.target !== progressEl) {
    next();
  } else if (e.key === 'ArrowLeft' && e.target !== progressEl) {
    prev();
  }
});

// System-level media controls (lock screen, headphones, etc.)
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', () => audio.play());
  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
  navigator.mediaSession.setActionHandler('previoustrack', prev);
  navigator.mediaSession.setActionHandler('nexttrack', next);
  try {
    navigator.mediaSession.setActionHandler('seekto', e => {
      if (e.fastSeek && 'fastSeek' in audio) audio.fastSeek(e.seekTime);
      else audio.currentTime = e.seekTime;
    });
  } catch (_) { /* not all browsers support seekto */ }
}

renderPlaylist();
</script>
</body>
</html>
